name: Release on tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Validate tag and version files
        id: version
        shell: bash
        run: |
          git fetch origin master --depth=1

          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/master"; then
            echo "Release tags must point to a commit on master."
            exit 1
          fi

          tag_version="${GITHUB_REF_NAME#v}"
          package_version=$(node -p "require('./package.json').version")
          manifest_version=$(node -p "require('./manifest.json').version")

          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag version ($tag_version) does not match package.json ($package_version)."
            exit 1
          fi

          if [ "$package_version" != "$manifest_version" ]; then
            echo "package.json ($package_version) does not match manifest.json ($manifest_version)."
            exit 1
          fi

          echo "version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck source
        run: npm run typecheck

      - name: Package extension source
        run: zip -r build.zip manifest.json public src vendor

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: build.zip
